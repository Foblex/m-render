<div class="f-code-controls">
  <button class="f-copy-button" type="button" (click)="onCopyClick()">{{ copyButtonLabel() }}</button>
  <span class="f-code-language">{{ visibleLanguage() }}</span>
</div>
@if (content()) {
  <div class="f-code-scroll">
    <highlight [content]="content()" [language]="syntaxLanguage()"/>
  </div>
}
